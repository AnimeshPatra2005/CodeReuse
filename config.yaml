repository:
  path: "./sample_repo"
  exclude_patterns:
    - "*/tests/*"
    - "*/venv/*"
    - "*/__pycache__/*"
    - "*.pyc"
    - ".git/*"
    - "*/node_modules/*"

indexing:
  embedder:
    model: "all-MiniLM-L6-v2"  # Code-optimized embeddings
    dimension: 384
    batch_size: 32
  vector_db:
    type: "chromadb"
    persist_directory: "./chroma_db"
    collection_name: "code_functions"

agent:
  mode: "legacy"  # or "greenfield"
  llm:
    provider: "huggingface"  # Using Qwen via Hugging Face Inference
    model: "Qwen/Qwen2.5-Coder-32B-Instruct"
    temperature: 0.2
    max_tokens: 2048
    use_local: false  # Set to true for local inference
  subtask:
    enabled: false  # Simplified for MVP - single task only
    max_subtasks: 1
    min_subtasks: 1
  prompt:
    system_role: "You are a senior software architect who values code reuse and maintainability. You strongly prefer reusing existing functions over writing new code, as more code means more maintenance and auditing. Your goal is to leverage existing components whenever possible."

metrics:
  namespace:
    min_reuse_score: 0.4
    enabled: true
  structural:
    max_similarity: 0.85
    semantic_threshold: 0.75
    enabled: true
  dependency:
    check_breaking_changes: true
    enabled: true
  retry:
    max_retries: 3
    enabled: true

context:
  global:
    include_target_file: true
  local:
    min_similarity: 0.7
    max_k: 5
    dynamic_k: true

logging:
  level: "INFO"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  file: "./logs/agent.log"
  rotation: "10 MB"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:5500"
    - "http://127.0.0.1:5500"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
    - "null"
  websocket_enabled: true

